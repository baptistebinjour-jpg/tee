<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="vinted" content="width=device-width, initial-scale=1.0">
  <title>vinted
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;
      color: #333;
    }
    header {
      background: #fff;
      padding: 15px 20px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
      color: #09b1ba;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      min-width: 300px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .btn {
      background-color: #09b1ba;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 6px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    .summary {
      font-size: 14px;
    }
    .summary div {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }
    .total {
      font-weight: bold;
      font-size: 18px;
    }
    .notice {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>vinted</h1>
  <span>Paiement sécurisé 
</header>

<div class="container">

  <div class="card">
    <h2>Informations de paiement</h2>
    <input type="text" placeholder="Nom sur la carte">
    <input type="text" placeholder="Numéro de carte">
    <div class="row">
      <input type="text" placeholder="MM/AA">
      <input type="text" placeholder="CVC">
    </div>
    <input type="text" placeholder="Adresse email">
    <button class="btn" onclick="alert('Paiement simulé (démo)')">Payer maintenant</button>
   
  </div>

  <div class="card summary">
    <h2>Résumé de la commande</h2>
    <div><span>Article</span><span>25,00 €</span></div>
    <div><span>Frais de service</span><span>2,50 €</span></div>
    <div><span>Livraison</span><span>3,00 €</span></div>
    <hr>
    <div class="total"><span>Total</span><span>30,50 €</span></div>
  </div>

</div>

</body>
</html>
